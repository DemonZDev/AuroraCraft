version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: auroracraft-db
    environment:
      POSTGRES_USER: auroracraft
      POSTGRES_PASSWORD: auroracraft
      POSTGRES_DB: auroracraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auroracraft"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auroracraft-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://auroracraft:auroracraft@postgres:5432/auroracraft?schema=public
      - JWT_SECRET=auroracraft-jwt-secret-change-in-production
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - storage_data:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auroracraft-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  storage_data:

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: auroracraft-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auroracraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auroracraft-network

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    container_name: auroracraft-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auroracraft-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auroracraft-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/auroracraft
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-auroracraft-secret-key-change-in-production}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-auroracraft-encryption-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./workspaces:/app/workspaces
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker compilation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auroracraft-network
    restart: unless-stopped

  # Compile Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: auroracraft-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/auroracraft
      REDIS_URL: redis://redis:6379
    volumes:
      - ./workspaces:/app/workspaces
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker compilation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auroracraft-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auroracraft-frontend
    environment:
      REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - auroracraft-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  auroracraft-network:
    driver: bridge
